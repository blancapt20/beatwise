name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Beatwise CI – add frontend/ and backend/ to enable full pipeline"

  frontend:
    name: Frontend
    if: hashFiles('frontend/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Remove when lint is configured

      - name: Test
        run: npm run test
        continue-on-error: true  # Remove when tests exist

      - name: Build
        run: npm run build
        continue-on-error: true  # Remove when frontend exists

  backend:
    name: Backend
    if: hashFiles('backend/requirements*.txt') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: true  # Remove when requirements.txt exists

      - name: Lint
        run: ruff check .
        continue-on-error: true  # Remove when backend exists

      - name: Test
        run: pytest
        continue-on-error: true  # Remove when tests exist
